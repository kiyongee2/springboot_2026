spring:
  application:
    name: blog

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  #datasource:
    #url: jdbc:h2:mem:testdb

  datasource:
    url: jdbc:h2:file:./data/blogdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
# http://localhost:8080/h2-console/

  h2:
    console:
      enabled: true